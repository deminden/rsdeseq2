name: Rust

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: README quick start
        run: |
          quickstart_output="$(mktemp)"
          cargo run --quiet -p rsdeseq2 -- wald \
            --counts examples/quickstart/counts.tsv \
            --design examples/quickstart/design.tsv \
            --fit-type mean \
            --coefficient 1 \
            --output "$quickstart_output"
          test "$(wc -l < "$quickstart_output")" -eq 5
