[workspace]
members = ["crates/rsdeseq2", "crates/rsdeseq2py"]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
repository = "https://github.com/deminden/rsdeseq2"
rust-version = "1.76"

[workspace.dependencies]
approx = "0.5"
clap = { version = "4.5", features = ["derive"] }
criterion = { version = "0.5", features = ["html_reports"] }
csv = "1.3"
nalgebra = "0.33"
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
statrs = "0.18"
thiserror = "1.0"
